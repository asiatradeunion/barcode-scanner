<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VMART 바코드 스캔</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #22c55e;
    --danger: #ef4444;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #334155;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; overflow-x: hidden; }

  body {
    height: 100%;
    overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 10px 16px;
    text-align: center;
    flex-shrink: 0;
  }

  header h1 { font-size: 15px; font-weight: 700; color: var(--muted); letter-spacing: 0.02em; }

  main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 8px 16px 16px;
    gap: 10px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* 카메라 영역 */
  .scanner-wrap {
    position: relative;
    width: 100%;
    flex-shrink: 0;
  }

  #reader {
    width: 100%;
    max-height: 40vh;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
  }

  #reader video { width: 100% !important; display: block; }

  #reader:empty {
    aspect-ratio: 1.5;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #reader:empty::after {
    content: '카메라가 꺼져 있습니다';
    color: var(--muted);
    font-size: 13px;
  }

  .torch-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: rgba(15, 23, 42, 0.65);
    color: var(--text);
    font-size: 17px;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 5;
  }

  .torch-btn.on { background: var(--accent); color: #052e10; }

  /* 스캔 토글 버튼 */
  .btn-scan {
    flex-shrink: 0;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    background: var(--accent);
    color: #052e10;
  }

  .btn-scan.stop { background: var(--card); color: var(--text); }
  .btn-scan:active { opacity: 0.85; }

  /* 직접 입력 */
  .link-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 13px;
    text-decoration: underline;
    text-underline-offset: 3px;
    padding: 2px 0;
    cursor: pointer;
    align-self: center;
  }

  .link-btn.danger {
    color: var(--danger);
    margin-top: 6px;
  }

  .link-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .manual-row {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .manual-input {
    flex: 1;
    min-width: 0;
    padding: 12px 14px;
    font-size: 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #0b1220;
    color: var(--text);
  }

  .manual-input::placeholder { color: var(--muted); }

  .manual-confirm {
    padding: 12px 16px;
    border-radius: 12px;
    border: none;
    background: var(--border);
    color: var(--text);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }

  /* 상품 카드 */
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    flex-shrink: 0;
  }

  .card-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .product-name {
    font-size: 20px;
    font-weight: 700;
    min-height: 28px;
    line-height: 1.3;
  }

  .product-barcode {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }

  .status-error { color: var(--danger); font-size: 15px; font-weight: 600; }

  /* 수량 */
  .qty-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .qty-btn {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    border: none;
    background: #0b1220;
    color: var(--text);
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
  }

  .qty-btn:active { opacity: 0.7; }

  .qty-input {
    flex: 1;
    min-width: 0;
    height: 46px;
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    background: #0b1220;
    border: none;
    border-radius: 12px;
    color: var(--text);
  }

  /* 저장 버튼 */
  .save-btn {
    flex-shrink: 0;
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: var(--accent);
    color: #052e10;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .save-btn:active { opacity: 0.85; }

  .save-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* 최근 기록 */
  .history-wrap { flex-shrink: 0; }

  .history-title {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    padding-left: 2px;
  }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--card);
    border-radius: 10px;
    margin-bottom: 6px;
    font-size: 14px;
  }

  .history-name { font-weight: 600; }
  .history-added { color: var(--muted); font-weight: 400; font-size: 12px; }
  .history-qty { color: var(--accent); font-weight: 700; font-size: 13px; white-space: nowrap; }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--accent);
    color: #052e10;
    padding: 12px 22px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 15px;
    opacity: 0;
    transition: opacity 0.22s, transform 0.22s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); color: #fff; }
</style>
</head>
<body>

<header>
  <h1>📦 VMART 바코드 스캔</h1>
</header>

<main>
  <div class="scanner-wrap">
    <div id="reader"></div>
    <button class="torch-btn" id="torchBtn">🔦</button>
  </div>

  <button class="btn-scan" id="scanToggleBtn">📷 스캔 시작</button>

  <button class="link-btn" id="manualToggleBtn">바코드 직접 입력</button>
  <div class="manual-row" id="manualRow" style="display:none;">
    <input type="text" class="manual-input" id="manualInput"
      placeholder="바코드 번호 입력" inputmode="numeric" autocomplete="off">
    <button class="manual-confirm" id="manualConfirm">확인</button>
  </div>

  <div class="card">
    <div class="card-label">인식된 상품</div>
    <div class="product-name" id="productName">스캔 대기 중</div>
    <div class="product-barcode" id="productBarcode"></div>

    <div class="qty-row">
      <button class="qty-btn" id="qtyMinus">−</button>
      <input type="number" class="qty-input" id="qtyInput" value="1" min="1">
      <button class="qty-btn" id="qtyPlus">+</button>
    </div>
  </div>

  <button class="save-btn" id="saveBtn" disabled>저장하기</button>

  <div class="history-wrap" id="historyWrap" style="display:none;">
    <div class="history-title">최근 기록</div>
    <div id="historyList"></div>
  </div>

  <button class="link-btn danger" id="resetBtn">🗑 새 재고조사 시작 (초기화)</button>
</main>

<div class="toast" id="toast"></div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz9iIsdcgnT00EEtJz0z59iPDIm7IsJRfCNKfBgu9vf-mP8qGSqlbUAOjDHXK05Nb19/exec";

let scanner = null;
let scanning = false;
let currentBarcode = null;
let isLookingUp = false;
let recentHistory = [];
let torchOn = false;
let torchFeatureRef = null;

const productNameEl = document.getElementById('productName');
const productBarcodeEl = document.getElementById('productBarcode');
const saveBtn = document.getElementById('saveBtn');
const qtyInput = document.getElementById('qtyInput');
const scanToggleBtn = document.getElementById('scanToggleBtn');
const torchBtn = document.getElementById('torchBtn');
const toastEl = document.getElementById('toast');
const manualToggleBtn = document.getElementById('manualToggleBtn');
const manualRow = document.getElementById('manualRow');
const manualInput = document.getElementById('manualInput');
const manualConfirm = document.getElementById('manualConfirm');
const historyWrap = document.getElementById('historyWrap');
const historyList = document.getElementById('historyList');
const resetBtn = document.getElementById('resetBtn');

function showToast(msg, isError = false) {
  toastEl.textContent = msg;
  toastEl.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { toastEl.className = 'toast'; }, 2500);
}

function resetProduct() {
  currentBarcode = null;
  productNameEl.textContent = '스캔 대기 중';
  productBarcodeEl.textContent = '';
  saveBtn.disabled = true;
  saveBtn.textContent = '저장하기';
  qtyInput.value = 1;
  manualInput.value = '';
}

async function lookupBarcode(barcode) {
  if (isLookingUp || !barcode) return;
  barcode = barcode.trim();
  if (!barcode) return;

  // 같은 바코드 재스캔 시 저장 버튼만 다시 활성화
  if (barcode === currentBarcode) {
    saveBtn.disabled = false;
    return;
  }

  isLookingUp = true;
  productNameEl.textContent = '조회 중...';
  productBarcodeEl.textContent = barcode;
  saveBtn.disabled = true;
  currentBarcode = null;

  try {
    const res = await fetch(`${WEB_APP_URL}?action=lookup&barcode=${encodeURIComponent(barcode)}`);
    const data = await res.json();

    if (data.success) {
      currentBarcode = barcode;
      productNameEl.textContent = data.name;
      productBarcodeEl.textContent = barcode;
      saveBtn.disabled = false;
      if (navigator.vibrate) navigator.vibrate(60);
    } else {
      productNameEl.innerHTML = '<span class="status-error">⚠ 등록되지 않은 상품</span>';
      productBarcodeEl.textContent = barcode;
      saveBtn.disabled = true;
    }
  } catch {
    productNameEl.innerHTML = '<span class="status-error">⚠ 조회 실패 (인터넷 확인)</span>';
    saveBtn.disabled = true;
  } finally {
    isLookingUp = false;
  }
}

// 스캐너 시작/중지 토글
function toggleScanner() {
  if (scanning) {
    stopScanner();
  } else {
    startScanner();
  }
}

function startScanner() {
  if (scanning) return;
  scanner = new Html5Qrcode("reader", {
    formatsToSupport: [
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
    ],
    // 지원 브라우저(주로 안드로이드 크롬)에서 네이티브 바코드 인식기를 사용해 속도 향상
    experimentalFeatures: {
      useBarCodeDetectorIfSupported: true
    },
    verbose: false
  });

  scanner.start(
    { facingMode: "environment" },
    {
      fps: 20,
      // 뷰파인더 대비 넉넉한 인식 영역으로, 각도/거리가 조금 어긋나도 잘 잡히도록 설정
      qrbox: (viewfinderWidth, viewfinderHeight) => {
        const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
        return {
          width: Math.floor(viewfinderWidth * 0.9),
          height: Math.floor(minEdge * 0.55)
        };
      },
      aspectRatio: 1.5,
      // 해상도를 높여 멀리 있거나 작은 바코드도 더 잘 인식되도록 설정
      videoConstraints: {
        facingMode: "environment",
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    },
    (decoded) => { lookupBarcode(decoded); },
    () => {}
  ).then(() => {
    scanning = true;
    scanToggleBtn.textContent = '⏹ 스캔 중지';
    scanToggleBtn.classList.add('stop');
    setupTorchButton();
  }).catch(() => {
    showToast('카메라를 열 수 없습니다', true);
  });
}

function stopScanner() {
  if (!scanning || !scanner) return;
  scanner.stop().then(() => {
    scanner.clear();
    scanner = null;
    scanning = false;
    scanToggleBtn.textContent = '📷 스캔 시작';
    scanToggleBtn.classList.remove('stop');
    hideTorchButton();
  }).catch(() => {});
}

// 손전등(플래시) 지원 여부 확인 후 버튼 노출 - 저조도 대응
function setupTorchButton() {
  torchFeatureRef = null;
  torchOn = false;
  torchBtn.classList.remove('on');
  torchBtn.style.display = 'none';

  if (!scanner || !scanner.getRunningTrackCameraCapabilities) return;

  try {
    const capabilities = scanner.getRunningTrackCameraCapabilities();
    const torchFeature = capabilities.torchFeature ? capabilities.torchFeature() : null;
    if (torchFeature && torchFeature.isSupported && torchFeature.isSupported()) {
      torchFeatureRef = torchFeature;
      torchBtn.style.display = 'flex';
    }
  } catch {
    // 손전등 미지원 기기 - 버튼 숨김 유지
  }
}

function hideTorchButton() {
  torchBtn.style.display = 'none';
  torchBtn.classList.remove('on');
  torchFeatureRef = null;
  torchOn = false;
}

torchBtn.addEventListener('click', () => {
  if (!torchFeatureRef) return;
  torchOn = !torchOn;
  torchFeatureRef.apply(torchOn).then(() => {
    torchBtn.classList.toggle('on', torchOn);
  }).catch(() => {
    showToast('손전등을 제어할 수 없습니다', true);
  });
});

scanToggleBtn.addEventListener('click', toggleScanner);

// 직접 입력 토글
manualToggleBtn.addEventListener('click', () => {
  const isHidden = manualRow.style.display === 'none';
  manualRow.style.display = isHidden ? 'flex' : 'none';
  if (isHidden) manualInput.focus();
});

// 수량 버튼
document.getElementById('qtyMinus').addEventListener('click', () => {
  qtyInput.value = Math.max(1, parseInt(qtyInput.value || 1) - 1);
});
document.getElementById('qtyPlus').addEventListener('click', () => {
  qtyInput.value = parseInt(qtyInput.value || 1) + 1;
});

// 직접 입력 - 확인 버튼
manualConfirm.addEventListener('click', () => {
  const v = manualInput.value.trim();
  if (v) lookupBarcode(v);
});

// 직접 입력 - 키보드 엔터
manualInput.addEventListener('keyup', (e) => {
  if (e.key === 'Enter') {
    const v = manualInput.value.trim();
    if (v) lookupBarcode(v);
  }
});

// 저장
saveBtn.addEventListener('click', async () => {
  if (!currentBarcode) return;
  const qty = parseInt(qtyInput.value || 1);
  if (qty < 1) return;

  saveBtn.disabled = true;
  saveBtn.textContent = '저장 중...';

  try {
    const res = await fetch(`${WEB_APP_URL}?action=save&barcode=${encodeURIComponent(currentBarcode)}&quantity=${qty}`);
    const data = await res.json();

    if (data.success) {
      showToast(`✓ ${data.name} 누적 ${data.total}개`);
      recentHistory.unshift({ name: data.name, added: qty, total: data.total });
      if (recentHistory.length > 5) recentHistory.pop();
      renderHistory();
      resetProduct();
    } else {
      showToast(data.message || '저장 실패', true);
      saveBtn.disabled = false;
      saveBtn.textContent = '저장하기';
    }
  } catch {
    showToast('저장 실패 (인터넷 확인)', true);
    saveBtn.disabled = false;
    saveBtn.textContent = '저장하기';
  }
});

// 새 재고조사 시작 (기존 기록은 보관 탭으로 옮기고 초기화)
resetBtn.addEventListener('click', async () => {
  const ok = confirm('현재까지의 기록을 보관 탭으로 옮기고, 새로 처음부터 시작합니다.\n계속할까요?');
  if (!ok) return;

  resetBtn.disabled = true;
  resetBtn.textContent = '초기화 중...';

  try {
    const res = await fetch(`${WEB_APP_URL}?action=reset`);
    const data = await res.json();

    if (data.success) {
      recentHistory = [];
      historyList.innerHTML = '';
      historyWrap.style.display = 'none';
      showToast('새 재고조사를 시작합니다');
    } else {
      showToast(data.message || '초기화 실패', true);
    }
  } catch {
    showToast('초기화 실패 (인터넷 확인)', true);
  } finally {
    resetBtn.disabled = false;
    resetBtn.textContent = '🗑 새 재고조사 시작 (초기화)';
  }
});

function renderHistory() {
  if (recentHistory.length === 0) return;
  historyWrap.style.display = 'block';
  historyList.innerHTML = recentHistory.map(h =>
    `<div class="history-item">
      <span class="history-name">${h.name} <span class="history-added">(+${h.added})</span></span>
      <span class="history-qty">누적 ${h.total}개</span>
    </div>`
  ).join('');
}
</script>

</body>
</html>
